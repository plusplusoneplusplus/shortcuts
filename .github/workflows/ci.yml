name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Run forge tests
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:run
        working-directory: packages/forge

      - name: Run forge tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage
        working-directory: packages/forge

      - name: Build coc SPA client bundle
        run: npm run build:client
        working-directory: packages/coc

      - name: Run coc tests
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:run
        working-directory: packages/coc

      - name: Run coc tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage
        working-directory: packages/coc

      - name: Run deep-wiki tests
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:run
        working-directory: packages/deep-wiki

      - name: Run deep-wiki tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage
        working-directory: packages/deep-wiki

      - name: Build coc package
        run: npm run build
        working-directory: packages/coc

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/coc

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        working-directory: packages/coc

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Compile tests
        run: npm run compile-tests

      - name: Copy test fixtures
        run: npm run copy-fixtures

      - name: Run extension tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:extension
        env:
          DISPLAY: ':99.0'

      - name: Run extension tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: npm run test:extension

      - name: Generate diff coverage report
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
        run: |
          for pkg in forge coc deep-wiki; do
            echo "==> Generating diff coverage for $pkg"
            cd packages/$pkg
            bash ../../scripts/coverage-diff.sh origin/main || true
            cd ../..
          done

      - name: Upload coverage reports
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            packages/forge/coverage/
            packages/coc/coverage/
            packages/deep-wiki/coverage/
          retention-days: 14

  package:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Package extension
        run: npm run vsce:package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: workspace-shortcuts-vsix
          path: '*.vsix'
          retention-days: 7
