name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Lint
        run: npm run lint

  forge-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Run forge tests
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:run
        working-directory: packages/forge

      - name: Run forge tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage
        working-directory: packages/forge

      - name: Generate diff coverage report
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
        run: bash ../../scripts/coverage-diff.sh origin/main || true
        working-directory: packages/forge

      - name: Upload forge coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: forge-coverage
          path: packages/forge/coverage/
          retention-days: 14

  coc-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        shard: [1, 2, 3, 4, 5]
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Build coc-client package
        run: npm run build
        working-directory: packages/coc-client

      - name: Build teams-bot package
        run: npm run build
        working-directory: packages/teams-bot

      - name: Build coc SPA client bundle
        run: npm run build:client
        working-directory: packages/coc

      - name: Run coc tests (shard ${{ matrix.shard }}/5)
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:run -- --shard=${{ matrix.shard }}/5
        working-directory: packages/coc

      - name: Run coc tests with coverage (shard ${{ matrix.shard }}/5)
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage -- --shard=${{ matrix.shard }}/5
        working-directory: packages/coc

      - name: Upload coc coverage shard
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coc-coverage-shard-${{ matrix.shard }}
          path: packages/coc/coverage/coverage-final.json
          retention-days: 1

  coc-coverage:
    runs-on: ubuntu-latest
    needs: [coc-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Download coc coverage shards
        uses: actions/download-artifact@v4
        with:
          pattern: coc-coverage-shard-*
          path: packages/coc/coverage-shards/

      - name: Aggregate sharded coverage into lcov.info
        working-directory: packages/coc
        run: |
          set -euo pipefail
          mkdir -p .nyc_output coverage
          i=0
          for f in coverage-shards/coc-coverage-shard-*/coverage-final.json; do
            if [ -f "$f" ]; then
              i=$((i+1))
              cp "$f" ".nyc_output/shard-$i.json"
              echo "==> Loaded shard $i from $f"
            fi
          done
          if [ "$i" -eq 0 ]; then
            echo "ERROR: no coverage-final.json shard inputs found under coverage-shards/" >&2
            exit 1
          fi
          npx --yes nyc@15 report \
            --temp-dir .nyc_output \
            --report-dir coverage \
            --reporter=lcov \
            --reporter=cobertura \
            --reporter=html \
            --reporter=text

      - name: Generate diff coverage report
        if: github.event_name == 'pull_request'
        working-directory: packages/coc
        env:
          SKIP_TESTS: '1'
        run: bash ../../scripts/coverage-diff.sh origin/main || true

      - name: Upload merged coc coverage
        uses: actions/upload-artifact@v4
        with:
          name: coc-coverage
          path: packages/coc/coverage/
          retention-days: 14

  deep-wiki-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Run deep-wiki tests
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:run
        working-directory: packages/deep-wiki

      - name: Run deep-wiki tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage
        working-directory: packages/deep-wiki

      - name: Generate diff coverage report
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
        run: bash ../../scripts/coverage-diff.sh origin/main || true
        working-directory: packages/deep-wiki

      - name: Upload deep-wiki coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: deep-wiki-coverage
          path: packages/deep-wiki/coverage/
          retention-days: 14

  extension-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Compile extension (builds all packages and webpacks extension)
        run: npm run compile

      - name: Compile tests
        run: npm run compile-tests

      - name: Copy test fixtures
        run: npm run copy-fixtures

      - name: Run extension tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:extension
        env:
          DISPLAY: ':99.0'

      - name: Run extension tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: npm run test:extension

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Build coc-client package
        run: npm run build
        working-directory: packages/coc-client

      - name: Build coc SPA client bundle
        run: npm run build:client
        working-directory: packages/coc

      - name: Build coc package
        run: npm run build
        working-directory: packages/coc

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/coc

      - name: Run Playwright E2E tests (shard ${{ matrix.shard }}/4)
        run: npx playwright test --config test/e2e/playwright.config.ts --shard=${{ matrix.shard }}/4
        working-directory: packages/coc

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: packages/coc/playwright-report/
          retention-days: 7

  ci:
    runs-on: ubuntu-latest
    needs: [lint, forge-test, coc-test, coc-coverage, deep-wiki-test, extension-test, e2e]
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        run: |
          declare -A results=(
            [lint]="${{ needs.lint.result }}"
            [forge-test]="${{ needs.forge-test.result }}"
            [coc-test]="${{ needs.coc-test.result }}"
            [coc-coverage]="${{ needs.coc-coverage.result }}"
            [deep-wiki-test]="${{ needs.deep-wiki-test.result }}"
            [extension-test]="${{ needs.extension-test.result }}"
            [e2e]="${{ needs.e2e.result }}"
          )
          failed=0
          for job in "${!results[@]}"; do
            status="${results[$job]}"
            echo "$job: $status"
            if [[ "$status" != "success" ]]; then
              failed=1
            fi
          done
          if [[ $failed -ne 0 ]]; then
            echo "::error::One or more required CI jobs did not succeed."
            exit 1
          fi
          echo "All required CI jobs succeeded."

  package:
    runs-on: ubuntu-latest
    needs: [lint, forge-test, coc-test, deep-wiki-test, extension-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Package extension
        run: npm run vsce:package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: workspace-shortcuts-vsix
          path: '*.vsix'
          retention-days: 7
