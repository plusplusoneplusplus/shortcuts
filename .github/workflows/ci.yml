name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dependency-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            scripts/skillopt/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Audit production dependency graph
        run: npm audit --omit=dev --audit-level=high

      - name: Audit full dependency graph
        run: npm audit --audit-level=high

      - name: Install SkillOpt dependencies
        run: npm ci
        working-directory: scripts/skillopt

      - name: Audit SkillOpt dependency graph
        run: npm audit --audit-level=high
        working-directory: scripts/skillopt

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Lint
        run: npm run lint

  forge-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build coc-agent-sdk package
        run: npm run build
        working-directory: packages/coc-agent-sdk

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Run forge tests
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:run
        working-directory: packages/forge

      - name: Run forge tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage
        working-directory: packages/forge

      - name: Generate diff coverage report
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
        run: bash ../../scripts/coverage-diff.sh origin/main || true
        working-directory: packages/forge

      - name: Upload forge coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: forge-coverage
          path: packages/forge/coverage/
          retention-days: 14

  coc-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        shard: [1, 2, 3, 4, 5]
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build coc-agent-sdk package
        run: npm run build
        working-directory: packages/coc-agent-sdk

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Build coc-client package
        run: npm run build
        working-directory: packages/coc-client

      - name: Build coc-memory package
        run: npm run build
        working-directory: packages/coc-memory

      - name: Build coc-connector package
        run: npm run build
        working-directory: packages/coc-connector

      - name: Build coc SPA client bundle
        run: npm run build:client
        working-directory: packages/coc

      - name: Run coc tests (shard ${{ matrix.shard }}/5)
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:run -- --shard=${{ matrix.shard }}/5
        working-directory: packages/coc

      - name: Run coc tests with coverage (shard ${{ matrix.shard }}/5)
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage -- --shard=${{ matrix.shard }}/5
        working-directory: packages/coc

      - name: Upload coc coverage shard
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coc-coverage-shard-${{ matrix.shard }}
          path: packages/coc/coverage/coverage-final.json
          retention-days: 1

  coc-coverage:
    runs-on: ubuntu-latest
    needs: [coc-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Download coc coverage shards
        uses: actions/download-artifact@v4
        with:
          pattern: coc-coverage-shard-*
          path: packages/coc/coverage-shards/

      - name: Aggregate sharded coverage into lcov.info
        working-directory: packages/coc
        run: |
          set -euo pipefail
          mkdir -p .nyc_output coverage
          i=0
          for f in coverage-shards/coc-coverage-shard-*/coverage-final.json; do
            if [ -f "$f" ]; then
              i=$((i+1))
              cp "$f" ".nyc_output/shard-$i.json"
              echo "==> Loaded shard $i from $f"
            fi
          done
          if [ "$i" -eq 0 ]; then
            echo "ERROR: no coverage-final.json shard inputs found under coverage-shards/" >&2
            exit 1
          fi
          npx --yes nyc@15 report \
            --temp-dir .nyc_output \
            --report-dir coverage \
            --reporter=lcov \
            --reporter=cobertura \
            --reporter=html \
            --reporter=text

      - name: Generate diff coverage report
        if: github.event_name == 'pull_request'
        working-directory: packages/coc
        env:
          SKIP_TESTS: '1'
        run: bash ../../scripts/coverage-diff.sh origin/main || true

      - name: Upload merged coc coverage
        uses: actions/upload-artifact@v4
        with:
          name: coc-coverage
          path: packages/coc/coverage/
          retention-days: 14

  deep-wiki-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build coc-agent-sdk package
        run: npm run build
        working-directory: packages/coc-agent-sdk

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Run deep-wiki tests
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:run
        working-directory: packages/deep-wiki

      - name: Run deep-wiki tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage
        working-directory: packages/deep-wiki

      - name: Generate diff coverage report
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
        run: bash ../../scripts/coverage-diff.sh origin/main || true
        working-directory: packages/deep-wiki

      - name: Upload deep-wiki coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: deep-wiki-coverage
          path: packages/deep-wiki/coverage/
          retention-days: 14

  e2e:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --ipc=host
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install native build dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: apt-get update && apt-get install -y --no-install-recommends build-essential

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build coc-agent-sdk package
        run: npm run build
        working-directory: packages/coc-agent-sdk

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Build coc-client package
        run: npm run build
        working-directory: packages/coc-client

      - name: Build coc-memory package
        run: npm run build
        working-directory: packages/coc-memory

      - name: Build coc-connector package
        run: npm run build
        working-directory: packages/coc-connector

      - name: Build coc SPA client bundle
        run: npm run build:client
        working-directory: packages/coc

      - name: Build coc package
        run: npm run build
        working-directory: packages/coc

      - name: Run Playwright E2E tests (shard ${{ matrix.shard }}/4)
        run: npx playwright test --config test/e2e/playwright.config.ts --shard=${{ matrix.shard }}/4
        working-directory: packages/coc

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: packages/coc/playwright-report/
          retention-days: 7

  coc-serve-smoke:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build packages
        run: npm run build:packages

      - name: Start coc serve and verify health
        shell: bash
        run: |
          # Pipe from sleep to keep stdin open (prevents Windows readline 'close' shutdown)
          sleep 120 | node packages/coc/dist/index.js serve --no-open --port 4111 &
          SERVER_PID=$!
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:4111/api/health > /dev/null 2>&1; then
              echo "✓ Server healthy after ${i}s"
              kill $SERVER_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "✗ Server failed to respond within 60s"
          kill $SERVER_PID 2>/dev/null || true
          exit 1

  coccontainer-serve-smoke:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build packages
        run: npm run build:packages

      - name: Build coccontainer package
        run: npm run build
        working-directory: packages/coccontainer

      - name: Start coccontainer serve and verify health
        shell: bash
        run: |
          sleep 120 | node packages/coccontainer/dist/index.js serve --no-open --port 4222 &
          SERVER_PID=$!
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:4222/api/container/agents > /dev/null 2>&1; then
              echo "✓ CoCContainer healthy after ${i}s"
              kill $SERVER_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "✗ CoCContainer failed to respond within 60s"
          kill $SERVER_PID 2>/dev/null || true
          exit 1

  coc-desktop-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build coc-desktop package
        run: npm run build
        working-directory: packages/coc-desktop

      - name: Run coc-desktop tests
        run: npm run test:run
        working-directory: packages/coc-desktop

  workflow-policy-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Run workflow policy tests
        run: node --test scripts/release-workflow.test.mjs

  ci:
    runs-on: ubuntu-latest
    needs: [dependency-security, lint, forge-test, coc-test, coc-coverage, deep-wiki-test, e2e, coc-serve-smoke, coccontainer-serve-smoke, coc-desktop-test, workflow-policy-test]
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        run: |
          declare -A results=(
            [dependency-security]="${{ needs.dependency-security.result }}"
            [lint]="${{ needs.lint.result }}"
            [forge-test]="${{ needs.forge-test.result }}"
            [coc-test]="${{ needs.coc-test.result }}"
            [coc-coverage]="${{ needs.coc-coverage.result }}"
            [deep-wiki-test]="${{ needs.deep-wiki-test.result }}"
            [e2e]="${{ needs.e2e.result }}"
            [coc-serve-smoke]="${{ needs.coc-serve-smoke.result }}"
            [coccontainer-serve-smoke]="${{ needs.coccontainer-serve-smoke.result }}"
            [coc-desktop-test]="${{ needs.coc-desktop-test.result }}"
            [workflow-policy-test]="${{ needs.workflow-policy-test.result }}"
          )
          failed=0
          for job in "${!results[@]}"; do
            status="${results[$job]}"
            echo "$job: $status"
            if [[ "$status" != "success" ]]; then
              failed=1
            fi
          done
          if [[ $failed -ne 0 ]]; then
            echo "::error::One or more required CI jobs did not succeed."
            exit 1
          fi
          echo "All required CI jobs succeeded."
