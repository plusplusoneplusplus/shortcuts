name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  forge-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Run forge tests
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:run
        working-directory: packages/forge

      - name: Run forge tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage
        working-directory: packages/forge

      - name: Generate diff coverage report
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
        run: bash ../../scripts/coverage-diff.sh origin/main || true
        working-directory: packages/forge

      - name: Upload forge coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: forge-coverage
          path: packages/forge/coverage/
          retention-days: 14

  coc-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Build coc-client package
        run: npm run build
        working-directory: packages/coc-client

      - name: Build coc SPA client bundle
        run: npm run build:client
        working-directory: packages/coc

      - name: Run coc tests
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:run
        working-directory: packages/coc

      - name: Run coc tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage
        working-directory: packages/coc

      - name: Generate diff coverage report
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
        run: bash ../../scripts/coverage-diff.sh origin/main || true
        working-directory: packages/coc

      - name: Upload coc coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coc-coverage
          path: packages/coc/coverage/
          retention-days: 14

  deep-wiki-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Run deep-wiki tests
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:run
        working-directory: packages/deep-wiki

      - name: Run deep-wiki tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage
        working-directory: packages/deep-wiki

      - name: Generate diff coverage report
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
        run: bash ../../scripts/coverage-diff.sh origin/main || true
        working-directory: packages/deep-wiki

      - name: Upload deep-wiki coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: deep-wiki-coverage
          path: packages/deep-wiki/coverage/
          retention-days: 14

  extension-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile extension (builds all packages and webpacks extension)
        run: npm run compile

      - name: Compile tests
        run: npm run compile-tests

      - name: Copy test fixtures
        run: npm run copy-fixtures

      - name: Run extension tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:extension
        env:
          DISPLAY: ':99.0'

      - name: Run extension tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: npm run test:extension

  ci:
    runs-on: ubuntu-latest
    needs: [lint, forge-test, coc-test, deep-wiki-test, extension-test]
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        run: |
          declare -A results=(
            [lint]="${{ needs.lint.result }}"
            [forge-test]="${{ needs.forge-test.result }}"
            [coc-test]="${{ needs.coc-test.result }}"
            [deep-wiki-test]="${{ needs.deep-wiki-test.result }}"
            [extension-test]="${{ needs.extension-test.result }}"
          )
          failed=0
          for job in "${!results[@]}"; do
            status="${results[$job]}"
            echo "$job: $status"
            if [[ "$status" != "success" ]]; then
              failed=1
            fi
          done
          if [[ $failed -ne 0 ]]; then
            echo "::error::One or more required CI jobs did not succeed."
            exit 1
          fi
          echo "All required CI jobs succeeded."

  package:
    runs-on: ubuntu-latest
    needs: [lint, forge-test, coc-test, deep-wiki-test, extension-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Package extension
        run: npm run vsce:package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: workspace-shortcuts-vsix
          path: '*.vsix'
          retention-days: 7
