name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build forge package
        run: npm run build
        working-directory: packages/forge

      - name: Build coc SPA client bundle
        run: npm run build:client
        working-directory: packages/coc

      - name: Build coc package
        run: npm run build
        working-directory: packages/coc

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/coc

      - name: Run Playwright E2E tests (shard ${{ matrix.shard }}/4)
        run: npx playwright test --config test/e2e/playwright.config.ts --shard=${{ matrix.shard }}/4
        working-directory: packages/coc

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: packages/coc/playwright-report/
          retention-days: 7

  e2e-summary:
    if: always()
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Check E2E results
        run: |
          if [ "${{ needs.e2e.result }}" = "failure" ]; then
            echo "::error::E2E tests failed. Check individual shard results for details."
            exit 1
          fi
          echo "All E2E shards passed."
