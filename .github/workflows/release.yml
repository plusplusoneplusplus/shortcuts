name: Release

# Build and publish the CoC desktop binaries when a release tag is pushed or
# when a release tag is dispatched manually.
# Fires for stable tags (v1.2.3) and pre-release tags (v1.2.3-alpha.1, -beta.2, -rc.1, ...).
# Pre-release tags produce a non-draft GitHub Release marked as pre-release.
# Stable tags produce a draft GitHub Release.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build, for example v3.4.8-alpha.1'
        required: true
        type: string

# create-release needs the injected GITHUB_TOKEN to create a GitHub Release.
permissions:
  contents: write

jobs:
  dependency-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            scripts/skillopt/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Audit production dependency graph
        run: bash "$GITHUB_WORKSPACE/scripts/ci-npm-audit.sh" --omit=dev

      - name: Audit full dependency graph
        run: bash "$GITHUB_WORKSPACE/scripts/ci-npm-audit.sh"

      - name: Install SkillOpt dependencies
        run: npm ci
        working-directory: scripts/skillopt

      - name: Audit SkillOpt dependency graph
        run: bash "$GITHUB_WORKSPACE/scripts/ci-npm-audit.sh"
        working-directory: scripts/skillopt

  # AC-03 — macOS binary (.dmg).
  build-mac:
    needs: dependency-security
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # AC-02 — write the tag's semver (minus the leading "v") into the desktop
      # package.json for this build only. Never committed back to the repo.
      - name: Sync desktop version from tag
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          export VERSION
          echo "Setting coc-desktop version to $VERSION"
          node -e "const fs=require('fs');const p='packages/coc-desktop/package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=process.env.VERSION;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      # Root build also produces the coc server bundle the app embeds
      # (electron-builder packs node_modules/@plusplusoneplusplus/coc/dist/**).
      - name: Build packages
        run: npm run build

      - name: Build macOS distributables
        run: npm run dist:mac
        working-directory: packages/coc-desktop
        env:
          # No signing certs yet (out of scope) — stop electron-builder from
          # trying to auto-discover a macOS signing identity.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coc-mac
          path: packages/coc-desktop/release/*.dmg
          if-no-files-found: error
          retention-days: 7

  # AC-04 — Windows installer (.exe via nsis). Mirrors build-mac.
  build-win:
    needs: dependency-security
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # AC-02 — same version sync as the mac job (build-only, not committed).
      - name: Sync desktop version from tag
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          export VERSION
          echo "Setting coc-desktop version to $VERSION"
          node -e "const fs=require('fs');const p='packages/coc-desktop/package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=process.env.VERSION;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      - name: Build packages
        run: npm run build

      # dist:win runs prebuild:sqlite:win internally before electron-builder.
      - name: Build Windows distributables
        run: npm run dist:win
        working-directory: packages/coc-desktop

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coc-win
          path: packages/coc-desktop/release/*.exe
          if-no-files-found: error
          retention-days: 7

  # AC-05 — collect both platforms' artifacts into a single draft release.
  create-release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          mapfile -t files < <(find artifacts -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No artifacts were downloaded for the release."
            exit 1
          fi
          echo "Attaching ${#files[@]} file(s) to the release:"
          printf '  %s\n' "${files[@]}"

          # Detect pre-release: tag has a suffix after the semver (e.g. -alpha.1, -beta.2, -rc.1).
          VERSION="${TAG#v}"
          if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+-'; then
            IS_PRERELEASE=true
            PRERELEASE_FLAG="--prerelease"
            DRAFT_FLAGS=()
          else
            IS_PRERELEASE=false
            PRERELEASE_FLAG=""
            DRAFT_FLAGS=(--draft)
          fi

          # Install/troubleshooting notes. The builds are not yet code-signed or
          # notarized, so macOS Gatekeeper reports the downloaded app as
          # "damaged" — document the quarantine workaround so testers aren't blocked.
          notes_file="$(mktemp)"
          {
            if [ "$IS_PRERELEASE" = "true" ]; then
              cat <<EOF
          > [!WARNING]
          > **Pre-release build** — This is an early/unstable release. Expect rough edges and possible breaking changes. Please [report issues](../../issues) if you hit problems.

          EOF
            fi
            cat <<EOF
          ## Install

          ### macOS (Apple Silicon)
          1. Open \`CoC-${VERSION}-arm64.dmg\` and drag **CoC** into your Applications folder.
          2. On first launch macOS may say **"CoC is damaged and can't be opened."** This build is **not yet code-signed or notarized**, so Gatekeeper blocks the downloaded file — it is **not** actually corrupt. Clear the download quarantine flag, then open it normally:
             \`\`\`
             xattr -dr com.apple.quarantine /Applications/CoC.app
             \`\`\`
             (Adjust the path if you installed CoC elsewhere.)

          ### Windows
          Run \`CoC.Setup.${VERSION}.exe\`. SmartScreen may warn about an unknown publisher — choose **More info → Run anyway**. This installer is also unsigned for now.
          EOF
          } > "$notes_file"

          gh release create "$TAG" \
            "${DRAFT_FLAGS[@]}" \
            $PRERELEASE_FLAG \
            --title "CoC $TAG" \
            --notes-file "$notes_file" \
            "${files[@]}"
