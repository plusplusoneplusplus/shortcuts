name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build forge
        run: npm run build
        working-directory: packages/forge

      - name: Build coc-client
        run: npm run build
        working-directory: packages/coc-client

      - name: Build teams-bot
        run: npm run build
        working-directory: packages/teams-bot

      - name: Build coc SPA client
        run: npm run build:client
        working-directory: packages/coc

      - name: Build coc
        run: npm run build
        working-directory: packages/coc

      - name: Build deep-wiki
        run: npm run build:bundle
        working-directory: packages/deep-wiki

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
