version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /scripts/skillopt
    schedule:
      interval: weekly
    groups:
      skillopt-npm-minor-and-patch:
        update-types:
          - minor
          - patch
