<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CoC HTML Preview Check</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111827;
      color: #f9fafb;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.38), transparent 34rem),
        linear-gradient(135deg, #111827, #312e81);
    }

    main {
      width: min(34rem, calc(100vw - 2rem));
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 1.25rem;
      background: rgba(17, 24, 39, 0.72);
      box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.8rem, 6vw, 3rem);
      line-height: 1;
    }

    p {
      margin: 0.75rem 0;
      color: #d1d5db;
    }

    button {
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      border: 0;
      border-radius: 999px;
      background: #60a5fa;
      color: #0f172a;
      font-weight: 700;
      cursor: pointer;
    }

    output {
      display: block;
      margin-top: 1rem;
      color: #93c5fd;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>HTML preview works</h1>
    <p>This local page is small, self-contained, and safe to use as a manual CoC chat embed check.</p>
    <p>If you can see this card inside the chat iframe, the local HTML preview path is loading.</p>
    <button type="button" id="countButton">Click to test scripts</button>
    <output id="status">Script loaded. Click count: 0</output>
  </main>

  <script>
    let clicks = 0;
    const status = document.getElementById('status');
    document.getElementById('countButton').addEventListener('click', () => {
      clicks += 1;
      status.textContent = `Script loaded. Click count: ${clicks}`;
    });
  </script>
</body>
</html>
