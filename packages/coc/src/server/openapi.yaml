openapi: '3.1.0'
info:
  title: CoC Server API
  description: HTTP API for the CoC execution server
  version: 1.0.0
servers:
  - url: /
    description: Local server

tags:
  - name: health
    description: Server health and diagnostics
  - name: admin
    description: Administrative endpoints
  - name: models
    description: AI model registry
  - name: providers
    description: Provider configuration
  - name: logs
    description: Server log access
  - name: Preferences
    description: Global and per-repo UI preference management.
  - name: seen-state
    description: Per-process read/unread (seen/unseen) tracking
  - name: pin-archive
    description: Pin and archive management for processes
  - name: stats
    description: Token usage statistics

paths:
  /api/health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Server health check
      description: Returns server status, uptime in seconds, and total process count.
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/openapi.json:
    get:
      operationId: getOpenApiSpec
      tags: [health]
      summary: OpenAPI specification (JSON)
      description: Returns the OpenAPI spec parsed from the bundled YAML file and serialized as JSON.
      responses:
        '200':
          description: The OpenAPI specification document
          content:
            application/json:
              schema:
                type: object
                description: OpenAPI 3.1.0 specification document
        '404':
          description: Spec file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/docs:
    get:
      operationId: getSwaggerUi
      tags: [health]
      summary: Swagger UI
      description: Serves an HTML page embedding Swagger UI, pointed at /api/openapi.json.
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string

  /api/admin/heap:
    get:
      operationId: getHeapSnapshot
      tags: [admin]
      summary: V8 heap memory snapshot
      description: Returns current V8 heap statistics for memory-pressure monitoring.
      responses:
        '200':
          description: Heap statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeapSnapshot'

  /api/logs/sources:
    get:
      operationId: getLogSources
      tags: [logs]
      summary: Configured log sources
      description: Lists available log sources and whether file-based logging is configured.
      responses:
        '200':
          description: Log sources list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogSourcesResponse'

  /api/models:
    get:
      operationId: listModels
      tags: [models]
      summary: List available AI models
      description: >-
        Returns all known AI models. When server config is available, each model
        includes an `enabled` boolean. Falls back to the static model registry if
        the live model store is empty.
      responses:
        '200':
          description: Array of model info objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModelInfo'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/models/enabled:
    get:
      operationId: getEnabledModels
      tags: [models]
      summary: List enabled model IDs
      description: Returns the list of model IDs that are currently enabled in the server configuration.
      responses:
        '200':
          description: Enabled model IDs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnabledModelsResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: setEnabledModels
      summary: Set enabled models
      description: Replace the list of enabled model IDs. Persists to the server config file.
      tags:
        - models
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - enabledModels
              properties:
                enabledModels:
                  type: array
                  items:
                    type: string
                  description: Model IDs to enable
      responses:
        '200':
          description: Updated enabled models list
          content:
            application/json:
              schema:
                type: object
                required:
                  - enabledModels
                properties:
                  enabledModels:
                    type: array
                    items:
                      type: string
        '400':
          description: Validation error (enabledModels must be an array of strings)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/providers/config:
    get:
      operationId: getProviderConfig
      tags: [providers]
      summary: Get sanitized provider configuration
      description: >-
        Returns provider configuration with credentials redacted. GitHub shows
        only `hasToken` (boolean); ADO shows only `orgUrl`.
      responses:
        '200':
          description: Sanitized provider configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderConfigResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateProviderConfig
      summary: Update provider credentials
      description: >-
        Validate and persist provider credentials. Accepts GitHub token and/or
        Azure DevOps org URL. Returns 204 No Content on success.
      tags:
        - providers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                github:
                  type: object
                  properties:
                    token:
                      type: string
                      description: GitHub personal access token (non-empty string)
                  required:
                    - token
                ado:
                  type: object
                  properties:
                    orgUrl:
                      type: string
                      description: Azure DevOps organization URL (non-empty string)
                  required:
                    - orgUrl
      responses:
        '204':
          description: Provider config saved successfully
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Global preferences ──────────────────────────────────────────

  /api/preferences:
    get:
      operationId: getGlobalPreferences
      summary: Read global preferences
      tags: [Preferences]
      responses:
        '200':
          description: Current global preferences (empty object if none stored).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalPreferences'

    put:
      operationId: replaceGlobalPreferences
      summary: Replace global preferences
      description: >-
        Replaces the entire global preferences object.
        Unknown keys are silently dropped during validation.
      tags: [Preferences]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlobalPreferences'
      responses:
        '200':
          description: The validated preferences after replacement.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalPreferences'
        '400':
          description: Invalid JSON body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      operationId: patchGlobalPreferences
      summary: Partially update global preferences
      description: >-
        Shallow-merges the provided fields into the existing global preferences.
        Only supplied keys are overwritten; omitted keys are preserved.
        Unknown keys are silently dropped during validation.
      tags: [Preferences]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlobalPreferences'
      responses:
        '200':
          description: The full merged preferences after the patch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalPreferences'
        '400':
          description: Invalid JSON body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Per-repo preferences ────────────────────────────────────────

  /api/workspaces/{id}/preferences:
    parameters:
      - name: id
        in: path
        required: true
        description: URL-encoded workspace identifier.
        schema:
          type: string

    get:
      operationId: getRepoPreferences
      summary: Read per-repo preferences
      tags: [Preferences]
      responses:
        '200':
          description: Current per-repo preferences (empty object if none stored).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerRepoPreferences'

    put:
      operationId: replaceRepoPreferences
      summary: Replace per-repo preferences
      description: >-
        Replaces the entire per-repo preferences object.
        Unknown keys are silently dropped during validation.
      tags: [Preferences]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerRepoPreferences'
      responses:
        '200':
          description: The validated preferences after replacement.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerRepoPreferences'
        '400':
          description: Invalid JSON body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      operationId: patchRepoPreferences
      summary: Partially update per-repo preferences
      description: >-
        Shallow-merges supplied fields into existing per-repo preferences.
        Special deep-merge behavior for nested objects:
        - `lastSkills`: merges per-mode (task/ask/plan) individually; an empty
          array for a mode clears that mode.
        - `lastModels`: merges per-mode (task/ask/plan) individually.
        - `defaultModels`: merges per-mode individually; empty string clears a mode.
        - `linkedRepoIds`: sending an empty array `[]` deletes the key entirely.
        Omitted keys are preserved. Unknown keys are silently dropped.
      tags: [Preferences]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerRepoPreferences'
      responses:
        '200':
          description: The full merged preferences after the patch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerRepoPreferences'
        '400':
          description: Invalid JSON body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Skill usage tracking ────────────────────────────────────────

  /api/workspaces/{id}/preferences/skill-usage:
    parameters:
      - name: id
        in: path
        required: true
        description: URL-encoded workspace identifier.
        schema:
          type: string

    get:
      operationId: getSkillUsage
      summary: Read skill usage timestamps
      description: >-
        Returns repo skill usage entries from `skillUsageMap`, optionally
        filtered by exact skill name and entries recorded at or after `since`.
      tags: [Preferences]
      parameters:
        - name: skillName
          in: query
          required: false
          schema:
            type: string
          description: Exact skill name to include.
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Only include usage timestamps at or after this ISO timestamp.
      responses:
        '200':
          description: Matching skill usage entries sorted by newest timestamp first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillUsageListResponse'
        '400':
          description: Invalid `since` value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      operationId: recordSkillUsage
      summary: Record a skill usage timestamp
      description: >-
        Records the current timestamp for the given skill name in the repo's
        `skillUsageMap`. Used to order skill dropdowns by recency.
      tags: [Preferences]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillUsageRequest'
      responses:
        '200':
          description: The recorded skill name and timestamp.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillUsageResponse'
        '400':
          description: Missing or empty `skillName`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/workspaces/{id}/preferences/commit-skill-usage:
    parameters:
      - name: id
        in: path
        required: true
        description: URL-encoded workspace identifier.
        schema:
          type: string

    get:
      operationId: getCommitSkillUsage
      summary: Read commit-scoped skill usage timestamps
      description: >-
        Returns commit-scoped skill usage entries from `commitSkillUsageMap`,
        optionally filtered by exact skill name and entries recorded at or after `since`.
      tags: [Preferences]
      parameters:
        - name: skillName
          in: query
          required: false
          schema:
            type: string
          description: Exact skill name to include.
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Only include usage timestamps at or after this ISO timestamp.
      responses:
        '200':
          description: Matching skill usage entries sorted by newest timestamp first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillUsageListResponse'
        '400':
          description: Invalid `since` value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      operationId: recordCommitSkillUsage
      summary: Record a commit-scoped skill usage timestamp
      description: >-
        Records the current timestamp for the given skill name in the repo's
        `commitSkillUsageMap`. Used to order the Git tab "Use Skill" context
        menu by recency, separate from the general `skillUsageMap`.
      tags: [Preferences]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillUsageRequest'
      responses:
        '200':
          description: The recorded skill name and timestamp.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillUsageResponse'
        '400':
          description: Missing or empty `skillName`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Seen-State ──────────────────────────────────────────────

  /api/workspaces/{id}/seen-state:
    get:
      tags: [seen-state]
      operationId: getSeenState
      summary: Get full seen-state map for a workspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Map of processId → seenAt timestamp
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeenStateMap'
    patch:
      tags: [seen-state]
      operationId: batchUpdateSeenState
      summary: Batch-update seen timestamps
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeenStateBatchUpdate'
      responses:
        '200':
          description: Updated full seen-state map
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeenStateMap'
        '400':
          description: Invalid entries array
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/workspaces/{id}/seen-state/count:
    get:
      tags: [seen-state]
      operationId: getUnseenCount
      summary: Get count of unseen processes in a workspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Unseen process count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnseenCountResponse'

  /api/workspaces/{id}/seen-state/{processId}:
    delete:
      tags: [seen-state]
      operationId: markProcessUnseen
      summary: Mark a single process as unseen
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - name: processId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Process marked unseen
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                    enum: [true]

  # ── Pin/Archive ─────────────────────────────────────────────

  /api/workspaces/{id}/pinned:
    get:
      tags: [pin-archive]
      operationId: getPinnedProcesses
      summary: List pinned processes for a workspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Pinned processes
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProcessIndexEntry'

  /api/processes/{id}/pin:
    patch:
      tags: [pin-archive]
      operationId: toggleProcessPin
      summary: Pin or unpin a process
      description: >-
        When pinning (pinned: true), the process is also auto-unarchived.
        When unpinning (pinned: false), pinnedAt is set to null.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pinned]
              properties:
                pinned:
                  type: boolean
      responses:
        '200':
          description: Updated pin state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PinResponse'

  /api/processes/{id}/archive:
    patch:
      tags: [pin-archive]
      operationId: toggleProcessArchive
      summary: Archive or unarchive a single process
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [archived]
              properties:
                archived:
                  type: boolean
      responses:
        '200':
          description: Updated archive state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchiveResponse'

  /api/processes/archive:
    post:
      tags: [pin-archive]
      operationId: bulkArchiveProcesses
      summary: Archive multiple processes at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkArchiveRequest'
      responses:
        '200':
          description: IDs of archived processes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkArchiveResponse'
        '400':
          description: Invalid ids array
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/processes/unarchive:
    post:
      tags: [pin-archive]
      operationId: bulkUnarchiveProcesses
      summary: Unarchive multiple processes at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkArchiveRequest'
      responses:
        '200':
          description: IDs of unarchived processes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkUnarchiveResponse'
        '400':
          description: Invalid ids array
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/stats/token-usage:
    get:
      operationId: getTokenUsageStats
      summary: Get token usage statistics
      description: >-
        Aggregates per-day, per-model token consumption across all persisted
        processes. Optionally filtered to the last N days.
      tags:
        - stats
      parameters:
        - name: days
          in: query
          required: false
          description: >-
            Limit results to the last N days. Only processes whose start time
            falls within the window are included. Omit for all-time stats.
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Aggregated token usage stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenUsageStatsResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/logs/history:
    get:
      operationId: getLogHistory
      summary: Query buffered log entries
      description: >-
        Returns structured log entries from the in-memory ring buffer (max 1000
        entries). Results are returned newest-first. Supports filtering by level,
        component, session, time, and free-text search.
      tags:
        - logs
      parameters:
        - name: level
          in: query
          required: false
          description: >-
            Minimum log level to include. Only entries at this level or above
            are returned.
          schema:
            type: string
            enum: [trace, debug, info, warn, error, fatal]
        - name: component
          in: query
          required: false
          description: Only include entries from this source component
          schema:
            type: string
        - name: sessionId
          in: query
          required: false
          description: Only include entries from this AI session
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: >-
            Maximum number of entries to return (default 200, max 1000).
            Values above 1000 are clamped.
          schema:
            type: integer
            default: 200
            minimum: 1
            maximum: 1000
        - name: before
          in: query
          required: false
          description: >-
            ISO 8601 timestamp cursor — return only entries with ts before this
            value. Used for pagination.
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          required: false
          description: >-
            Free-text search string. Case-insensitive match against msg,
            component, and sessionId fields.
          schema:
            type: string
      responses:
        '200':
          description: Log entries matching the query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogHistoryResponse'

  /api/logs/stream:
    get:
      operationId: streamLogs
      summary: Stream live log entries (SSE)
      description: >-
        Opens a Server-Sent Events stream for real-time log entries. On
        connection, replays up to 200 buffered history entries as a single
        `history` event (oldest-first), then emits individual `log-entry`
        events as they occur. A `heartbeat` event is sent every 15 seconds.
        
        SSE event types:
        - `history` — JSON array of LogEntry objects (initial replay)
        - `log-entry` — single LogEntry object
        - `heartbeat` — empty object `{}`
      tags:
        - logs
      parameters:
        - name: level
          in: query
          required: false
          description: >-
            Minimum log level filter. Only entries at this level or above
            are streamed.
          schema:
            type: string
            enum: [trace, debug, info, warn, error, fatal]
        - name: sessionId
          in: query
          required: false
          description: Only stream entries from this AI session
          schema:
            type: string
      responses:
        '200':
          description: SSE stream of log entries
          headers:
            Cache-Control:
              schema:
                type: string
                example: no-cache
            Connection:
              schema:
                type: string
                example: keep-alive
            X-Accel-Buffering:
              schema:
                type: string
                example: 'no'
          content:
            text/event-stream:
              schema:
                type: string
                description: >-
                  Server-Sent Events stream. Each event has `event:` and
                  `data:` fields. Event types: history (LogEntry[]),
                  log-entry (LogEntry), heartbeat ({}).

components:
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message

    HealthResponse:
      type: object
      required: [status, uptime, processCount]
      properties:
        status:
          type: string
          description: Server status (always "ok" when reachable)
          examples: ['ok']
        uptime:
          type: number
          description: Server uptime in seconds
        processCount:
          type: integer
          description: Total number of stored processes

    HeapSnapshot:
      type: object
      required: [usedHeapMB, totalHeapMB, heapLimitMB, usagePercent, externalMB, timestamp]
      properties:
        usedHeapMB:
          type: number
          description: Used heap size in megabytes
        totalHeapMB:
          type: number
          description: Total allocated heap size in megabytes
        heapLimitMB:
          type: number
          description: V8 heap size limit in megabytes
        usagePercent:
          type: number
          description: 'Heap usage as a percentage (0–100)'
        externalMB:
          type: number
          description: External memory usage in megabytes
        timestamp:
          type: number
          description: Snapshot timestamp (epoch milliseconds from Date.now())

    LogSource:
      type: object
      required: [id, label, description, active, fileConfigured]
      properties:
        id:
          type: string
          description: Unique source identifier
          examples: ['in-process']
        label:
          type: string
          description: Human-readable label
          examples: ['In-process (live)']
        description:
          type: string
          description: Source description
        active:
          type: boolean
          description: Whether this source is currently active
        fileConfigured:
          type: boolean
          description: Whether this source reads from a log file

    LogSourcesResponse:
      type: object
      required: [sources, logDir]
      properties:
        sources:
          type: array
          items:
            $ref: '#/components/schemas/LogSource'
        logDir:
          type:
            - string
            - 'null'
          description: Log directory path, or null if not configured

    ModelCapabilitiesSupports:
      type: object
      required: [vision, reasoningEffort]
      properties:
        vision:
          type: boolean
        reasoningEffort:
          type: boolean

    ModelCapabilitiesLimits:
      type: object
      required: [max_context_window_tokens]
      properties:
        max_context_window_tokens:
          type: integer
          description: Maximum context window size in tokens
        max_prompt_tokens:
          type: integer
          description: Maximum prompt tokens (optional)

    ModelCapabilities:
      type: object
      required: [supports, limits]
      properties:
        supports:
          $ref: '#/components/schemas/ModelCapabilitiesSupports'
        limits:
          $ref: '#/components/schemas/ModelCapabilitiesLimits'

    ModelPolicy:
      type: object
      required: [state]
      properties:
        state:
          type: string
          description: 'Policy state (e.g. "enabled", "disabled")'

    ModelBilling:
      type: object
      properties:
        multiplier:
          type: number
          description: Billing multiplier

    ModelInfo:
      type: object
      required: [id, name, capabilities]
      properties:
        id:
          type: string
          description: Model identifier
          examples: ['claude-sonnet-4']
        name:
          type: string
          description: Human-readable model name
        capabilities:
          $ref: '#/components/schemas/ModelCapabilities'
        policy:
          $ref: '#/components/schemas/ModelPolicy'
        billing:
          $ref: '#/components/schemas/ModelBilling'
        enabled:
          type: boolean
          description: Whether the model is enabled in server config (present only when config is available)

    EnabledModelsResponse:
      type: object
      required: [enabledModels]
      properties:
        enabledModels:
          type: array
          items:
            type: string
          description: List of enabled model IDs

    ProviderGitHubConfig:
      type: object
      required: [hasToken]
      properties:
        hasToken:
          type: boolean
          description: Whether a GitHub token is configured

    ProviderAdoConfig:
      type: object
      required: [orgUrl]
      properties:
        orgUrl:
          type: string
          description: Azure DevOps organization URL

    ProviderConfigResponse:
      type: object
      required: [providers]
      properties:
        providers:
          type: object
          properties:
            github:
              $ref: '#/components/schemas/ProviderGitHubConfig'
            ado:
              $ref: '#/components/schemas/ProviderAdoConfig'
          description: Configured providers (keys present only when configured)

    # ── Preferences helper types ───────────────────────────────────

    LastSkillsByMode:
      type: object
      description: Per-mode last-used skill names (arrays support multi-skill combinations).
      properties:
        task:
          type: array
          items: { type: string }
        ask:
          type: array
          items: { type: string }
        plan:
          type: array
          items: { type: string }

    LastModelsByMode:
      type: object
      description: Per-mode last-used AI model names.
      properties:
        task: { type: string }
        ask: { type: string }
        plan: { type: string }

    DefaultModelsByMode:
      type: object
      description: Per-mode default model overrides. Take precedence over the repo-wide defaultModel.
      properties:
        task: { type: string }
        ask: { type: string }
        plan: { type: string }
        note: { type: string }
        schedule: { type: string }
        followUp: { type: string }
        memory: { type: string }

    ScriptTemplateEntry:
      type: object
      description: A saved run-script template.
      required: [id, name, scriptPath]
      properties:
        id:
          type: string
          minLength: 1
        name:
          type: string
        scriptPath:
          type: string
        args:
          type: string
        workingDirectory:
          type: string
        model:
          type: string
        pauseOnFailure:
          type: boolean

    SkillTemplateEntry:
      type: object
      description: A saved skill/model template.
      required: [id, model, mode, skills]
      properties:
        id:
          type: string
          minLength: 1
        name:
          type: string
        model:
          type: string
        mode:
          type: string
          enum: [ask, task]
        skills:
          type: array
          items: { type: string }

    # ── Top-level preference objects ──────────────────────────────

    GlobalPreferences:
      type: object
      description: Global (cross-repo) UI preferences.
      properties:
        theme:
          type: string
          enum: [light, dark, auto]
          description: Persisted dashboard theme.
        reposSidebarCollapsed:
          type: boolean
          description: Whether the repos sidebar (left panel) is collapsed.
        gitGroupOrder:
          type: array
          items: { type: string }
          description: >-
            User-defined display order of repository groups.
            Each entry is a normalizedUrl (for grouped repos) or 'workspace:{id}' (for ungrouped repos).
        hasSeenWelcome:
          type: boolean
          description: Whether the user has dismissed the welcome modal.
        onboardingProgress:
          type: object
          description: Tracks progress through the onboarding checklist steps.
          properties:
            hasUsedChat: { type: boolean }
            hasRunWorkflow: { type: boolean }
            hasOpenedWiki: { type: boolean }
            settingsVisited: { type: boolean }
            dismissed: { type: boolean }
            hasCompletedTour: { type: boolean }
        dismissedTips:
          type: array
          items: { type: string }
          description: IDs of contextual tips the user has permanently dismissed.

    PerRepoPreferences:
      type: object
      description: Per-repository UI preferences.
      properties:
        lastModel:
          type: string
          deprecated: true
          description: 'Deprecated: use lastModels instead. Kept for backward compatibility on read.'
        lastModels:
          $ref: '#/components/schemas/LastModelsByMode'
        lastDepth:
          type: string
          enum: [deep, normal]
          description: Last-selected generation depth in the SPA.
        lastEffort:
          type: string
          enum: [low, medium, high]
          description: Last-selected effort level in the Generate Task dialog.
        lastSkills:
          $ref: '#/components/schemas/LastSkillsByMode'
        skillUsageMap:
          type: object
          additionalProperties: { type: string }
          description: 'Skill usage timestamps for ordering skill dropdowns (skillName → ISO timestamp).'
        linkedRepoIds:
          type: array
          items: { type: string }
          description: IDs of workspaces whose skill folders are linked via "Extra Skill Folders".
        scriptTemplates:
          type: array
          items:
            $ref: '#/components/schemas/ScriptTemplateEntry'
          description: Saved run-script templates from the Run Script dialog.
        skillTemplates:
          type: array
          items:
            $ref: '#/components/schemas/SkillTemplateEntry'
          description: Saved skill/model templates from the Run Skill dialog.
        filesViewMode:
          type: string
          enum: [flat, tree]
          description: Preferred file-list display mode across all git views.
        defaultModel:
          type: string
          maxLength: 100
          description: Repo-wide default model used when no explicit model is provided.
        defaultModels:
          $ref: '#/components/schemas/DefaultModelsByMode'
        htmlEmbed:
          type: object
          description: Sandboxed inline previews for local .html/.htm links whose markdown title is "embed".
          properties:
            enabled:
              type: boolean
              default: false

    SkillUsageRequest:
      type: object
      description: Request body for recording a skill usage.
      required: [skillName]
      properties:
        skillName:
          type: string
          minLength: 1

    SkillUsageResponse:
      type: object
      description: Confirmation of a recorded skill usage.
      required: [skillName, timestamp]
      properties:
        skillName:
          type: string
        timestamp:
          type: string
          format: date-time

    SkillUsageEntry:
      type: object
      description: A recorded skill usage timestamp.
      required: [skillName, timestamp]
      properties:
        skillName:
          type: string
        timestamp:
          type: string
          format: date-time

    SkillUsageListResponse:
      type: object
      description: Filtered skill usage entries.
      required: [usage]
      properties:
        usage:
          type: array
          items:
            $ref: '#/components/schemas/SkillUsageEntry'

    SeenStateMap:
      type: object
      description: >-
        Map of processId → ISO 8601 seenAt timestamp.
        Keys are process IDs; values are the timestamp when the process was last seen.
      additionalProperties:
        type: string
        format: date-time
      example:
        proc-abc123: '2025-01-15T10:30:00.000Z'
        proc-def456: '2025-01-15T11:00:00.000Z'

    SeenStateBatchUpdate:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            type: object
            required: [processId, seenAt]
            properties:
              processId:
                type: string
              seenAt:
                type: string
                format: date-time

    UnseenCountResponse:
      type: object
      required: [unseenCount]
      properties:
        unseenCount:
          type: integer

    ProcessIndexEntry:
      type: object
      required: [id, workspaceId, status, type, startTime, promptPreview]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        status:
          type: string
        type:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        promptPreview:
          type: string
        error:
          type: string
        parentProcessId:
          type: string
        title:
          type: string
        duration:
          type: number
          description: Duration in milliseconds (computed from startTime/endTime)
        lastEventAt:
          type: string
          format: date-time
          description: Timestamp of the last conversation event
        pinnedAt:
          type: string
          format: date-time
          description: ISO timestamp when the process was pinned (null = not pinned)
        archived:
          type: boolean
          description: Whether the process is archived

    PinResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string
        pinnedAt:
          type: ['string', 'null']
          format: date-time
          description: ISO timestamp when pinned; null when unpinned
        archived:
          type: boolean
          description: Present when pinning (auto-unarchives)

    ArchiveResponse:
      type: object
      required: [id, archived]
      properties:
        id:
          type: string
        archived:
          type: boolean

    BulkArchiveRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items:
            type: string

    BulkArchiveResponse:
      type: object
      required: [archived]
      properties:
        archived:
          type: array
          items:
            type: string

    BulkUnarchiveResponse:
      type: object
      required: [unarchived]
      properties:
        unarchived:
          type: array
          items:
            type: string

    TokenUsage:
      type: object
      description: Aggregated token consumption counters
      required:
        - inputTokens
        - outputTokens
        - cacheReadTokens
        - cacheWriteTokens
        - totalTokens
        - turnCount
      properties:
        inputTokens:
          type: integer
          description: Total input tokens consumed
        outputTokens:
          type: integer
          description: Total output tokens generated
        cacheReadTokens:
          type: integer
          description: Total cache-read tokens
        cacheWriteTokens:
          type: integer
          description: Total cache-write tokens
        totalTokens:
          type: integer
          description: Sum of inputTokens + outputTokens
        cost:
          type: number
          description: Cumulative cost (present only if reported by the SDK)
        duration:
          type: number
          description: Cumulative duration in ms (present only if reported by the SDK)
        turnCount:
          type: integer
          description: Number of assistant.usage events received (one per turn)

    TokenUsageStatsEntry:
      type: object
      description: Token usage aggregated for a single UTC day
      required:
        - date
        - byModel
        - dayTotal
      properties:
        date:
          type: string
          description: "UTC date in YYYY-MM-DD format"
          example: "2025-01-15"
        byModel:
          type: object
          description: "Model name → aggregated TokenUsage for that day"
          additionalProperties:
            $ref: '#/components/schemas/TokenUsage'
        dayTotal:
          $ref: '#/components/schemas/TokenUsage'

    TokenUsageStatsResponse:
      type: object
      description: Aggregated token usage statistics across all processes
      required:
        - entries
        - models
        - generatedAt
        - totalDays
      properties:
        entries:
          type: array
          description: Per-day usage entries sorted by date descending
          items:
            $ref: '#/components/schemas/TokenUsageStatsEntry'
        models:
          type: array
          description: Sorted deduplicated list of all model names seen
          items:
            type: string
        generatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the stats were generated
        totalDays:
          type: integer
          description: Number of entries (days with data)

    LogEntry:
      type: object
      description: A single structured log entry
      required:
        - ts
        - level
        - msg
      properties:
        ts:
          type: string
          format: date-time
          description: ISO 8601 timestamp
        level:
          type: string
          enum: [trace, debug, info, warn, error, fatal]
          description: Log severity level
        component:
          type: string
          description: "Source component (http, websocket, queue, ai-service, coc-service, …)"
        sessionId:
          type: string
          description: AI session identifier (present on SDK wrapper logs)
        msg:
          type: string
          description: Log message text
      additionalProperties: true

    LogHistoryResponse:
      type: object
      description: Paginated log history result
      required:
        - entries
        - total
      properties:
        entries:
          type: array
          description: Log entries in newest-first order
          items:
            $ref: '#/components/schemas/LogEntry'
        total:
          type: integer
          description: Number of entries returned (equals entries.length)

  parameters:
    WorkspaceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: URL-encoded workspace identifier
